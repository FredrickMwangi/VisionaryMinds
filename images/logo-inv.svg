<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 228 68" fill="none" role="img" aria-label="Visionary Minds">

  <!-- ── ICON: circle + eye (inverted for dark backgrounds) ── -->

  <!-- Outer ring -->
  <circle cx="34" cy="34" r="30" stroke="white" stroke-width="2.8" opacity="0.88"/>

  <!-- Eye almond -->
  <path d="M10,34 C20,17 48,17 58,34 C48,51 20,51 10,34Z"
        fill="rgba(255,255,255,0.10)" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.82"/>

  <!-- Iris -->
  <circle cx="34" cy="34" r="11" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2" opacity="0.82"/>

  <!-- Pupil -->
  <circle cx="34" cy="34" r="5.2" fill="white" opacity="0.88"/>

  <!-- Specular highlight -->
  <circle cx="37.5" cy="30.5" r="2.1" fill="rgba(30,41,59,0.35)"/>

  <!-- Gold sparkle dots -->
  <circle cx="34"  cy="13.5" r="1.6"  fill="#D4A017"/>
  <circle cx="45"  cy="16.5" r="1.2"  fill="#D4A017"/>
  <circle cx="23"  cy="16.5" r="1.2"  fill="#D4A017"/>
  <circle cx="54"  cy="22"   r="0.85" fill="#D4A017"/>
  <circle cx="14"  cy="22"   r="0.85" fill="#D4A017"/>

  <!-- ── TEXT (white + gold) ── -->

  <!-- VISIONARY -->
  <text x="80" y="28"
        font-family="Poppins, Arial, Helvetica, sans-serif"
        font-weight="800"
        font-size="20"
        fill="white"
        letter-spacing="1.2"
        opacity="0.9">VISIONARY</text>

  <!-- Thin gold rule -->
  <line x1="80" y1="33" x2="218" y2="33" stroke="#D4A017" stroke-width="0.9" opacity="0.50"/>

  <!-- MINDS -->
  <text x="80" y="52"
        font-family="Poppins, Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="20"
        fill="#D4A017"
        letter-spacing="6">MINDS</text>

</svg>
