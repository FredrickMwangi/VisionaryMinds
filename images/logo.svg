<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 228 68" fill="none" role="img" aria-label="Visionary Minds">

  <!-- ── ICON: circle + eye ── -->

  <!-- Outer ring -->
  <circle cx="34" cy="34" r="30" stroke="#1F6B3B" stroke-width="2.8"/>

  <!-- Eye almond (upper + lower lid via cubic bezier) -->
  <path d="M10,34 C20,17 48,17 58,34 C48,51 20,51 10,34Z"
        fill="#E8F5EE" stroke="#1F6B3B" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Iris (white base so pupil stands out) -->
  <circle cx="34" cy="34" r="11" fill="white" stroke="#1F6B3B" stroke-width="2"/>

  <!-- Pupil -->
  <circle cx="34" cy="34" r="5.2" fill="#1F6B3B"/>

  <!-- Specular highlight -->
  <circle cx="37.5" cy="30.5" r="2.1" fill="white"/>

  <!-- Gold sparkle dots above eye (radiance / vision) -->
  <circle cx="34"  cy="13.5" r="1.6"  fill="#D4A017"/>
  <circle cx="45"  cy="16.5" r="1.2"  fill="#D4A017"/>
  <circle cx="23"  cy="16.5" r="1.2"  fill="#D4A017"/>
  <circle cx="54"  cy="22"   r="0.85" fill="#D4A017"/>
  <circle cx="14"  cy="22"   r="0.85" fill="#D4A017"/>

  <!-- ── TEXT ── -->

  <!-- VISIONARY -->
  <text x="80" y="28"
        font-family="Poppins, Arial, Helvetica, sans-serif"
        font-weight="800"
        font-size="20"
        fill="#1F6B3B"
        letter-spacing="1.2">VISIONARY</text>

  <!-- Thin gold rule between the two words -->
  <line x1="80" y1="33" x2="218" y2="33" stroke="#D4A017" stroke-width="0.9" opacity="0.45"/>

  <!-- MINDS -->
  <text x="80" y="52"
        font-family="Poppins, Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="20"
        fill="#D4A017"
        letter-spacing="6">MINDS</text>

</svg>
